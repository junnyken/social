<!DOCTYPE html>
<html>
<head><title>Đang kết nối...</title></head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif">
    <div style="text-align:center">
      <div class="spinner" style="border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #38bdf8; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
      <p>Đang xác thực tài khoản...</p>
    </div>
  </div>
  <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
  <script>
    // Backend đã xử lý code exchange, chỉ cần redirect về app
    // URL: /auth-callback.html?status=success hoặc ?status=error
    const params = new URLSearchParams(window.location.search);
    if (params.get('status') === 'success') {
      // Nếu mở bằng popup
      if (window.opener) {
        window.opener.postMessage({ type: 'FB_AUTH_SUCCESS' }, '*');
        window.close();
      } else {
        // Nếu full redirect
        window.location.href = 'fb-autoposter.html#/accounts';
      }
    } else {
      const msg = params.get('message') || 'Đăng nhập thất bại';
      document.querySelector('p').textContent = '❌ ' + msg;
      setTimeout(() => window.location.href = 'fb-autoposter.html', 3000);
    }
  </script>
</body>
</html>
